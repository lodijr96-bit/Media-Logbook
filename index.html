<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────
const GH_USER  = 'lodijr96-bit';
const GH_REPO  = 'Media-Logbook';
const GH_FILE  = 'logbook-data.json';
const GH_TOKEN = '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';
const GH_API   = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;

// ── Constants ─────────────────────────────────────────────────────────────
const TYPES = ["Book","Series","Movie","Manga","Comic","Video Game"];
const STATUSES = ["Want","In Progress","Done"];
const STATUS_COLORS = {"Want":"#4a9eff","In Progress":"#f5a623","Done":"#5cb85c"};
const TYPE_ICONS = {Book:"📖",Series:"📺",Movie:"🎬",Manga:"🈶",Comic:"💬","Video Game":"🎮"};
const CHART_COLORS = ["#4a9eff","#f5a623","#5cb85c","#e67e9a","#a78bfa","#34d399","#fb923c","#f472b6","#a3e635","#60a5fa"];

// ── State ─────────────────────────────────────────────────────────────────
let entries = JSON.parse(localStorage.getItem('logbook-entries') || '[]');
let fileSha = localStorage.getItem('logbook-sha') || null; // GitHub needs SHA to update a file
let syncState = 'idle'; // idle | syncing | ok | error
let lastSync = localStorage.getItem('logbook-last-sync') || null;
let view = 'list';
let editId = null;
let detailId = null;
let filterType = 'All';
let filterStatus = 'All';
let searchQuery = '';
let summaryTab = 'type';
let summaryYear = 'All';
let genreDebounce = null;
let genreLoading = false;
let genreError = '';
let form = emptyForm();

function emptyForm() {
  return {title:'',type:'Book',status:'Want',rating:0,notes:'',genre:'',
    startDate:'',endDate:'',createdYear:String(new Date().getFullYear())};
}

// ── Toast ─────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── GitHub Sync ───────────────────────────────────────────────────────────
const GH_HEADERS = {
  'Authorization': `token ${GH_TOKEN}`,
  'Accept': 'application/vnd.github.v3+json',
  'Content-Type': 'application/json',
};

async function ghFetch(data) {
  // Load from GitHub, merge with local, resolve conflicts by latest id wins
  try {
    syncState = 'syncing'; render();
    const res = await fetch(GH_API, { headers: GH_HEADERS });
    if (res.status === 404) {
      // File doesn't exist yet — push local data up
      await ghPush(entries, null);
      return;
    }
    if (!res.ok) throw new Error(`GitHub fetch failed: ${res.status}`);
    const json = await res.json();
    fileSha = json.sha;
    localStorage.setItem('logbook-sha', fileSha);
    const remote = JSON.parse(atob(json.content.replace(/\n/g,'')));
    // Merge: combine both, deduplicate by id, remote wins on conflict
    const merged = mergeEntries(entries, remote);
    entries = merged;
    localStorage.setItem('logbook-entries', JSON.stringify(entries));
    lastSync = new Date().toISOString();
    localStorage.setItem('logbook-last-sync', lastSync);
    syncState = 'ok';
    toast('Synced with GitHub ✓');
  } catch(e) {
    syncState = 'error';
    toast('Sync failed — working offline');
    console.error(e);
  }
  render();
}

async function ghPush(data, sha) {
  try {
    syncState = 'syncing'; render();
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    const body = { message: `logbook update ${new Date().toISOString()}`, content };
    if (sha) body.sha = sha;
    const res = await fetch(GH_API, { method: 'PUT', headers: GH_HEADERS, body: JSON.stringify(body) });
    if (!res.ok) {
      const err = await res.json();
      // SHA conflict — re-fetch and retry once
      if (res.status === 409 || res.status === 422) {
        toast('Conflict — re-syncing…');
        fileSha = null;
        await ghFetch();
        await ghPush(entries, fileSha);
        return;
      }
      throw new Error(`Push failed: ${res.status} ${JSON.stringify(err)}`);
    }
    const json = await res.json();
    fileSha = json.content.sha;
    localStorage.setItem('logbook-sha', fileSha);
    lastSync = new Date().toISOString();
    localStorage.setItem('logbook-last-sync', lastSync);
    syncState = 'ok';
    toast('Saved & synced ✓');
  } catch(e) {
    syncState = 'error';
    toast('Save failed — check connection');
    console.error(e);
  }
  render();
}

function mergeEntries(local, remote) {
  const map = {};
  // Local first, then remote overwrites (remote is source of truth on conflict)
  local.forEach(e => map[e.id] = e);
  remote.forEach(e => map[e.id] = e);
  return Object.values(map).sort((a,b) => b.id - a.id);
}

async function saveEntries() {
  localStorage.setItem('logbook-entries', JSON.stringify(entries));
  await ghPush(entries, fileSha);
}

// ── Genre Fetch — free public APIs, no key required ──────────────────────

async function fetchFromOpenLibrary(title) {
  const q = encodeURIComponent(title);
  const res = await fetch(`https://openlibrary.org/search.json?q=${q}&limit=1&fields=subject,genre`);
  const data = await res.json();
  const doc = data?.docs?.[0];
  const subjects = [...(doc?.genre || []), ...(doc?.subject || [])];
  const clean = subjects.filter(s => s.length < 28 && !s.includes('--') && !/^\d{4}/.test(s) && !/fiction$/i.test(s) === false || /fiction|fantasy|mystery|thriller|romance|horror|science|adventure|history|biography/i.test(s));
  // Prefer shorter, recognizable genre words
  const genres = subjects.filter(s => s.length < 25 && !s.includes('--') && !/^\d/.test(s)).slice(0, 3);
  return genres.length ? genres.join(', ') : '';
}

async function fetchFromJikan(title) {
  const q = encodeURIComponent(title);
  const res = await fetch(`https://api.jikan.moe/v4/manga?q=${q}&limit=1`);
  const data = await res.json();
  const genres = data?.data?.[0]?.genres?.map(g => g.name) || [];
  return genres.slice(0, 3).join(', ');
}

async function fetchFromiTunes(title, type) {
  const q = encodeURIComponent(title);
  const media = type === 'Movie' ? 'movie' : 'tvShow';
  const entity = type === 'Movie' ? 'movie' : 'tvSeason';
  const res = await fetch(`https://itunes.apple.com/search?term=${q}&media=${media}&entity=${entity}&limit=1`);
  const data = await res.json();
  const item = data?.results?.[0];
  if (!item) return '';
  // iTunes returns primaryGenreName
  return item.primaryGenreName || '';
}

async function fetchFromWikipedia(title, type) {
  // Use Wikipedia's REST API to get the intro text, then look for genre mentions
  const q = encodeURIComponent(`${title} ${type}`);
  const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`);
  const data = await res.json();
  if (data?.type === 'disambiguation' || !data?.extract) return '';
  // Look for genre patterns in the extract
  const extract = data.extract;
  const genreMatch = extract.match(/(?:is a|is an|a|an)\s+([\w\s-]+?)\s+(?:video game|game|manga|comic|novel|book|film|movie|series|show)/i);
  if (genreMatch) {
    return genreMatch[1].trim().replace(/^(american|japanese|korean|british|french)\s+/i, '');
  }
  return '';
}

async function fetchGenreAI(title, type) {
  try {
    if (type === 'Book' || type === 'Comic') {
      const g = await fetchFromOpenLibrary(title);
      if (g) return g;
    }
    if (type === 'Manga') {
      const g = await fetchFromJikan(title);
      if (g) return g;
      // fallback to Wikipedia
      return await fetchFromWikipedia(title, type);
    }
    if (type === 'Movie' || type === 'Series') {
      const g = await fetchFromiTunes(title, type);
      if (g) return g;
      return await fetchFromWikipedia(title, type);
    }
    if (type === 'Video Game') {
      // Try Wikipedia first — RAWG requires a key
      const g = await fetchFromWikipedia(title, type);
      if (g) return g;
      // Fallback: iTunes games category
      const q = encodeURIComponent(title);
      const res = await fetch(`https://itunes.apple.com/search?term=${q}&media=software&entity=software&limit=3`);
      const data = await res.json();
      const game = data?.results?.find(r => r.genres?.length);
      return game?.genres?.[0] || '';
    }
  } catch { return ''; }
  return '';
}

function triggerGenreFetch() {
  clearTimeout(genreDebounce);
  if (!form.title.trim()) { genreError=''; render(); return; }
  genreDebounce = setTimeout(async () => {
    genreLoading=true; genreError=''; render();
    const g = await fetchGenreAI(form.title, form.type);
    genreLoading=false;
    if (g) { form.genre=g; genreError=''; }
    else genreError="Couldn't find — type it manually.";
    render();
  }, 900);
}

// ── Helpers ───────────────────────────────────────────────────────────────
function formatDate(iso) {
  if (!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${m}/${d}/${y}`;
}
function effectiveYear(e) {
  if (e.endDate) return e.endDate.slice(0,4);
  if (e.startDate) return e.startDate.slice(0,4);
  return e.createdYear || String(new Date().getFullYear());
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function stars(n,max=5) {
  return `<span style="color:#f5a623">${'★'.repeat(n)}</span><span style="color:#2a2a2a">${'★'.repeat(max-n)}</span>`;
}
function syncStatusHTML() {
  const timeStr = lastSync ? `Last sync ${new Date(lastSync).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}` : 'Not synced yet';
  if (syncState==='syncing') return `<span class="sync-status"><span class="spinner"></span><span style="color:#888">Syncing…</span></span>`;
  if (syncState==='ok') return `<span class="sync-status"><span class="sync-dot" style="background:#5cb85c"></span><span style="color:#555;font-size:10px;letter-spacing:1px">${timeStr}</span></span>`;
  if (syncState==='error') return `<span class="sync-status"><span class="sync-dot" style="background:#e74c3c"></span><span style="color:#555;font-size:10px;letter-spacing:1px">Offline</span></span>`;
  return `<span class="sync-status"><span class="sync-dot" style="background:#444"></span><span style="color:#555;font-size:10px;letter-spacing:1px">—</span></span>`;
}

// ── Summary helpers ───────────────────────────────────────────────────────
function buildSummary(es) {
  const byType={}, byGenre={};
  es.forEach(e => {
    byType[e.type]=(byType[e.type]||0)+1;
    if(e.genre) e.genre.split(',').map(g=>g.trim()).filter(Boolean).forEach(g=>{byGenre[g]=(byGenre[g]||0)+1;});
  });
  return {byType,byGenre};
}

// ── SVG Charts ────────────────────────────────────────────────────────────
function pieChartSVG(data, size=180) {
  if (!data.length) return '';
  const total=data.reduce((s,d)=>s+d.v,0); if(!total) return '';
  const cx=size/2, cy=size/2, r=size/2-10;
  let angle=-Math.PI/2, paths='', labels='';
  data.forEach((d,i)=>{
    const slice=(d.v/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
    angle+=slice;
    const x2=cx+r*Math.cos(angle), y2=cy+r*Math.sin(angle);
    const large=slice>Math.PI?1:0, mid=angle-slice/2;
    const lx=cx+(r*0.65)*Math.cos(mid), ly=cy+(r*0.65)*Math.sin(mid);
    const pct=Math.round((d.v/total)*100), col=CHART_COLORS[i%CHART_COLORS.length];
    paths+=`<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${large},1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${col}" stroke="#0e0e0e" stroke-width="2"/>`;
    if(slice>0.3) labels+=`<text x="${lx.toFixed(2)}" y="${ly.toFixed(2)}" text-anchor="middle" dominant-baseline="middle" style="font-size:10px;fill:#0e0e0e;font-weight:bold;font-family:Georgia,serif">${pct}%</text>`;
  });
  return `<svg width="${size}" height="${size}" style="display:block;margin:0 auto">${paths}${labels}</svg>`;
}
function barChartSVG(data, maxBars=12) {
  const items=data.slice(0,maxBars), max=items.length?items[0].v:1;
  const rowH=32, pad=100, chartW=260, svgH=items.length*rowH+10;
  let rows='';
  items.forEach((d,i)=>{
    const barW=Math.max(2,(d.v/max)*chartW), y=i*rowH+4, col=CHART_COLORS[i%CHART_COLORS.length];
    const lbl=d.k.length>15?d.k.slice(0,14)+'…':d.k;
    rows+=`<text x="${pad-6}" y="${y+12}" text-anchor="end" style="font-size:11px;fill:#aaa;font-family:Georgia,serif">${esc(lbl)}</text>`;
    rows+=`<rect x="${pad}" y="${y}" width="${barW.toFixed(1)}" height="18" fill="${col}" rx="1"/>`;
    rows+=`<text x="${pad+barW+6}" y="${y+12}" style="font-size:11px;fill:#666;font-family:Georgia,serif">${d.v}</text>`;
  });
  return `<svg width="100%" viewBox="0 0 ${pad+chartW+40} ${svgH}" style="display:block;overflow:visible">${rows}</svg>`;
}
function legendHTML(data) {
  return data.map((d,i)=>`<div class="legend-item"><div class="legend-dot" style="background:${CHART_COLORS[i%CHART_COLORS.length]}"></div><span class="legend-text">${esc(d.k)} (${d.v})</span></div>`).join('');
}

// ── Export/Import ─────────────────────────────────────────────────────────
function exportData() {
  const blob=new Blob([JSON.stringify(entries,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob), a=document.createElement('a');
  a.href=url; a.download='logbook-backup.json'; a.click();
  URL.revokeObjectURL(url);
}
function importData() {
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      try {
        const data=JSON.parse(ev.target.result);
        if(Array.isArray(data)){ entries=data; await saveEntries(); toast(`Imported ${data.length} entries`); render(); }
        else alert('Invalid file.');
      } catch { alert('Could not read file.'); }
    };
    reader.readAsText(f);
  };
  inp.click();
}

// ── Render ────────────────────────────────────────────────────────────────
function render() { document.getElementById('app').innerHTML=buildHTML(); bindEvents(); }

function buildHTML() {
  if(view==='summary') return buildSummaryHTML();
  if(view==='detail') return buildDetailHTML();
  if(view==='add') return buildFormHTML();
  return buildListHTML();
}

// ── List ──────────────────────────────────────────────────────────────────
function buildListHTML() {
  const counts={};
  STATUSES.forEach(s=>counts[s]=entries.filter(e=>e.status===s).length);
  const filtered=entries.filter(e=>{
    if(filterType!=='All'&&e.type!==filterType) return false;
    if(filterStatus!=='All'&&e.status!==filterStatus) return false;
    if(searchQuery&&!e.title.toLowerCase().includes(searchQuery.toLowerCase())) return false;
    return true;
  });
  const statsHTML=STATUSES.map(s=>`
    <div class="stat-chip">
      <div class="stat-dot" style="background:${STATUS_COLORS[s]}"></div>
      <span class="stat-label">${s}</span>
      <span class="stat-count">${counts[s]||0}</span>
    </div>`).join('')+`
    <div class="stat-chip">
      <div class="stat-dot" style="background:#555"></div>
      <span class="stat-label">Total</span>
      <span class="stat-count">${entries.length}</span>
    </div>`;
  const typeFilters=['All',...TYPES].map(t=>`
    <button class="${filterType===t?'filter-active':'filter-btn'}" data-filter-type="${esc(t)}">
      ${t==='All'?'All':TYPE_ICONS[t]+' '+t}
    </button>`).join('');
  const statusFilters=['All',...STATUSES].map(s=>{
    const isActive=filterStatus===s;
    const style=isActive&&s!=='All'?`style="background:${STATUS_COLORS[s]}22;border-color:${STATUS_COLORS[s]};color:${STATUS_COLORS[s]}"`:'';
    return `<button class="${isActive?'filter-active':'filter-btn'}" data-filter-status="${esc(s)}" ${style}>${s==='All'?'All Statuses':s}</button>`;
  }).join('');
  const cardsHTML=filtered.length===0
    ?`<div class="empty">${entries.length===0?'Nothing logged yet. Hit + Add to start.':'No matches found.'}</div>`
    :filtered.map(e=>{
      const yr=effectiveYear(e);
      const dateStr=(e.startDate||e.endDate)?(e.endDate?`${formatDate(e.startDate||'')} → ${formatDate(e.endDate)}`:`Started ${formatDate(e.startDate)}`):yr;
      return `<div class="card" data-open="${e.id}">
        <div class="card-left">
          <span class="type-icon">${TYPE_ICONS[e.type]}</span>
          <div class="card-info">
            <div class="card-title">${esc(e.title)}</div>
            ${e.genre?`<div class="card-genre">${esc(e.genre)}</div>`:''}
            <div class="card-meta">
              ${e.rating>0?`<span class="card-rating">${stars(e.rating)}</span>`:''}
              <span class="card-date">${esc(dateStr)}</span>
            </div>
          </div>
        </div>
        <span class="status-badge" style="background:${STATUS_COLORS[e.status]}22;color:${STATUS_COLORS[e.status]};border-color:${STATUS_COLORS[e.status]}">${e.status}</span>
      </div>`;
    }).join('');
  return `
    <div class="header">
      <div>
        <div class="header-title">LOGBOOK</div>
        <div class="header-sub">Books · Series · Movies · Manga · Comics · Games</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-summary" id="btn-summary">≡ Summary</button>
        <button class="btn-add" id="btn-add">+ Add</button>
      </div>
    </div>
    <div class="stats-bar">${statsHTML}</div>
    <div class="io-bar">
      <button class="btn-io" id="btn-sync">↻ Sync</button>
      <button class="btn-io" id="btn-export">⬇ Export</button>
      <button class="btn-io" id="btn-import">⬆ Import</button>
      ${syncStatusHTML()}
    </div>
    <div class="filters">
      <input class="search-input" id="search-input" placeholder="🔍 Search…" value="${esc(searchQuery)}"/>
      <div class="filter-row">${typeFilters}</div>
      <div class="filter-row">${statusFilters}</div>
    </div>
    <div class="list">${cardsHTML}</div>`;
}

// ── Form ──────────────────────────────────────────────────────────────────
function buildFormHTML() {
  const typePills=TYPES.map(t=>`<button class="${form.type===t?'pill-active':'pill'}" data-type="${esc(t)}">${TYPE_ICONS[t]} ${t}</button>`).join('');
  const statusPills=STATUSES.map(s=>{
    const isActive=form.status===s;
    const style=isActive?`style="background:${STATUS_COLORS[s]}22;border-color:${STATUS_COLORS[s]};color:${STATUS_COLORS[s]}"`:'';
    return `<button class="${isActive?'pill-active':'pill'}" data-status="${esc(s)}" ${style}>${s}</button>`;
  }).join('');
  const starsHTML=[1,2,3,4,5].map(r=>`<span class="star ${r<=form.rating?'on':''}" data-star="${r}">★</span>`).join('')
    +(form.rating>0?`<span class="clear-rating" id="clear-rating">✕</span>`:'');
  const isDone=form.status==='Done', noDate=!form.startDate&&!form.endDate;
  return `
    <div class="header">
      <div><div class="header-title">LOGBOOK</div><div class="header-sub">${editId!==null?'Editing Entry':'New Entry'}</div></div>
      <button class="btn-cancel" id="btn-cancel">✕ Cancel</button>
    </div>
    <div class="form-card">
      <div class="field-group">
        <label class="field-label">TITLE</label>
        <input class="text-input" id="f-title" placeholder="Title" value="${esc(form.title)}"/>
      </div>
      <div class="field-group">
        <label class="field-label">TYPE</label>
        <div class="pills">${typePills}</div>
      </div>
      <div class="field-group">
        <label class="field-label">STATUS</label>
        <div class="pills">${statusPills}</div>
      </div>
      <div class="field-group">
        <div class="date-row">
          <div>
            <label class="field-label">START DATE <span style="color:#3a3a3a">(optional)</span></label>
            <input type="date" class="date-input" id="f-start" value="${form.startDate}"/>
          </div>
          ${isDone?`<div><label class="field-label">END DATE <span style="color:#3a3a3a">(optional)</span></label><input type="date" class="date-input" id="f-end" value="${form.endDate}"/></div>`:''}
        </div>
        ${noDate?`<div class="date-hint">No dates — will log under ${form.createdYear||new Date().getFullYear()}.</div>`:''}
      </div>
      <div class="field-group">
        <label class="field-label">RATING</label>
        <div class="stars">${starsHTML}</div>
      </div>
      <div class="field-group">
        <label class="field-label">GENRE
          ${genreLoading?'<span class="fetching-label"> · looking up…</span>':''}
          ${!genreLoading&&form.genre&&!genreError?'<span class="fetching-label"> · fetched</span>':''}
        </label>
        <input class="text-input" id="f-genre" placeholder="${genreLoading?'Fetching via AI…':'e.g. Science Fiction, Fantasy'}" value="${esc(form.genre)}"/>
        ${genreError?`<div class="genre-hint">${esc(genreError)}</div>`:''}
      </div>
      <div class="field-group">
        <label class="field-label">NOTES</label>
        <textarea class="textarea" id="f-notes" rows="3" placeholder="Optional notes…">${esc(form.notes)}</textarea>
      </div>
      <button class="btn-submit" id="btn-submit">${editId!==null?'Save Changes':'Add to Logbook'}</button>
    </div>`;
}

// ── Detail ────────────────────────────────────────────────────────────────
function buildDetailHTML() {
  const e=entries.find(x=>x.id===detailId);
  if(!e){view='list';return buildListHTML();}
  const yr=effectiveYear(e), showYear=!e.startDate&&!e.endDate;
  return `
    <div class="header">
      <button class="btn-back" id="btn-back">← Back</button>
      <div class="actions-row">
        <button class="action-btn" id="btn-edit">✏️ Edit</button>
        <button class="action-btn" style="color:#c0392b" id="btn-delete">🗑️ Delete</button>
      </div>
    </div>
    <div class="detail-card">
      <div class="detail-type-row">
        <span class="detail-type-icon">${TYPE_ICONS[e.type]}</span>
        <span class="detail-type">${e.type.toUpperCase()}</span>
        <span class="status-badge" style="margin-left:auto;background:${STATUS_COLORS[e.status]}22;color:${STATUS_COLORS[e.status]};border-color:${STATUS_COLORS[e.status]}">${e.status}</span>
      </div>
      <div class="detail-title">${esc(e.title)}</div>
      ${e.genre?`<div class="detail-genre-row">${e.genre.split(',').map(g=>`<span class="genre-tag">${esc(g.trim())}</span>`).join('')}</div>`:''}
      ${e.rating>0?`<div class="detail-rating">${stars(e.rating)}</div>`:''}
      <div class="detail-dates">
        ${e.startDate?`<div class="date-chip"><span class="date-chip-label">STARTED</span><span class="date-chip-val">${formatDate(e.startDate)}</span></div>`:''}
        ${e.endDate?`<div class="date-chip"><span class="date-chip-label">FINISHED</span><span class="date-chip-val">${formatDate(e.endDate)}</span></div>`:''}
        ${showYear?`<div class="date-chip"><span class="date-chip-label">YEAR</span><span class="date-chip-val">${yr}</span></div>`:''}
      </div>
      ${e.notes?`<div class="detail-notes"><div class="detail-notes-label">NOTES</div><div class="detail-notes-text">${esc(e.notes)}</div></div>`:''}
    </div>`;
}

// ── Summary ───────────────────────────────────────────────────────────────
function buildSummaryHTML() {
  const years=[...new Set(entries.map(e=>effectiveYear(e)))].sort((a,b)=>b-a);
  const scoped=summaryYear==='All'?entries:entries.filter(e=>effectiveYear(e)===summaryYear);
  const {byType,byGenre}=buildSummary(scoped);
  const typeData=Object.entries(byType).sort((a,b)=>b[1]-a[1]).map(([k,v])=>({k,v}));
  const genreData=Object.entries(byGenre).sort((a,b)=>b[1]-a[1]).map(([k,v])=>({k,v}));
  const doneCount=scoped.filter(e=>e.status==='Done').length;
  const yearBtns=['All',...years].map(y=>`<button class="${summaryYear===y?'filter-active':'filter-btn'}" data-sum-year="${y}">${y}</button>`).join('');
  let contentHTML='';
  if(summaryTab==='type'){
    contentHTML=!typeData.length?'<div class="empty">No entries yet.</div>':`
      ${pieChartSVG(typeData)}
      <div class="legend">${legendHTML(typeData)}</div>
      <div class="summary-section" style="margin-top:28px;border-top:1px solid #1e1e1e;padding-top:20px">
        <div class="section-label">BREAKDOWN</div>
        ${barChartSVG(typeData.map(d=>({k:TYPE_ICONS[d.k]+' '+d.k,v:d.v})))}
      </div>`;
  } else {
    const top8=genreData.slice(0,8);
    contentHTML=!genreData.length?'<div class="empty">No genre data. Add genres to entries first.</div>':`
      ${pieChartSVG(top8)}
      <div class="legend">${legendHTML(top8)}</div>
      ${genreData.length>8?'<div style="font-size:11px;color:#444;text-align:center;margin-top:6px;font-style:italic">Top 8 shown in chart</div>':''}
      <div class="summary-section" style="margin-top:28px;border-top:1px solid #1e1e1e;padding-top:20px">
        <div class="section-label">ALL GENRES</div>
        ${barChartSVG(genreData,15)}
      </div>`;
  }
  return `
    <div class="header">
      <button class="btn-back" id="btn-back">← Back</button>
      <div style="text-align:right"><div class="header-title">SUMMARY</div><div class="header-sub">${doneCount} done · ${scoped.length} total</div></div>
    </div>
    ${years.length?`<div class="field-group"><div class="field-label">YEAR</div><div class="filter-row">${yearBtns}</div></div>`:''}
    <div class="tab-toggle">
      <button class="tab-btn${summaryTab==='type'?' active':''}" id="tab-type">By Medium</button>
      <button class="tab-btn${summaryTab==='genre'?' active':''}" id="tab-genre">By Genre</button>
    </div>
    ${contentHTML}`;
}

// ── Events ────────────────────────────────────────────────────────────────
function bindEvents() {
  const $=id=>document.getElementById(id);
  const on=(id,ev,fn)=>{const el=$(id);if(el)el.addEventListener(ev,fn);};
  on('btn-add','click',()=>{form=emptyForm();editId=null;view='add';render();});
  on('btn-summary','click',()=>{view='summary';render();});
  on('btn-sync','click',()=>ghFetch());
  on('btn-export','click',exportData);
  on('btn-import','click',importData);
  on('search-input','input',e=>{searchQuery=e.target.value;render();});
  document.querySelectorAll('[data-filter-type]').forEach(b=>b.addEventListener('click',()=>{filterType=b.dataset.filterType;render();}));
  document.querySelectorAll('[data-filter-status]').forEach(b=>b.addEventListener('click',()=>{filterStatus=b.dataset.filterStatus;render();}));
  document.querySelectorAll('[data-open]').forEach(el=>el.addEventListener('click',()=>{detailId=Number(el.dataset.open);view='detail';render();}));
  on('btn-cancel','click',()=>{if(detailId)view='detail';else view='list';render();});
  on('btn-submit','click',handleSubmit);
  const fTitle=$('f-title');
  if(fTitle) fTitle.addEventListener('input',e=>{form.title=e.target.value;triggerGenreFetch();});
  const fGenre=$('f-genre');if(fGenre)fGenre.addEventListener('input',e=>{form.genre=e.target.value;});
  const fNotes=$('f-notes');if(fNotes)fNotes.addEventListener('input',e=>{form.notes=e.target.value;});
  const fStart=$('f-start');if(fStart)fStart.addEventListener('change',e=>{form.startDate=e.target.value;render();});
  const fEnd=$('f-end');if(fEnd)fEnd.addEventListener('change',e=>{form.endDate=e.target.value;render();});
  document.querySelectorAll('[data-type]').forEach(b=>b.addEventListener('click',()=>{form.type=b.dataset.type;triggerGenreFetch();render();}));
  document.querySelectorAll('[data-status]').forEach(b=>b.addEventListener('click',()=>{
    const s=b.dataset.status;
    if(s==='In Progress'&&!form.startDate)form.startDate=new Date().toISOString().split('T')[0];
    if(s!=='Done')form.endDate='';
    form.status=s;render();
  }));
  document.querySelectorAll('[data-star]').forEach(s=>s.addEventListener('click',()=>{const r=Number(s.dataset.star);form.rating=form.rating===r?0:r;render();}));
  on('clear-rating','click',()=>{form.rating=0;render();});
  on('btn-back','click',()=>{view='list';detailId=null;render();});
  on('btn-edit','click',()=>{const e=entries.find(x=>x.id===detailId);if(e){form={...e};editId=e.id;view='add';render();}});
  on('btn-delete','click',()=>{
    if(confirm('Delete this entry?')){entries=entries.filter(e=>e.id!==detailId);saveEntries();detailId=null;view='list';render();}
  });
  on('tab-type','click',()=>{summaryTab='type';render();});
  on('tab-genre','click',()=>{summaryTab='genre';render();});
  document.querySelectorAll('[data-sum-year]').forEach(b=>b.addEventListener('click',()=>{summaryYear=b.dataset.sumYear;render();}));
}

async function handleSubmit() {
  const title=document.getElementById('f-title')?.value?.trim()||form.title.trim();
  const genre=document.getElementById('f-genre')?.value||form.genre;
  const notes=document.getElementById('f-notes')?.value||form.notes;
  const startDate=document.getElementById('f-start')?.value||form.startDate;
  const endDate=document.getElementById('f-end')?.value||form.endDate;
  if(!title) return;
  const entry={...form,title,genre,notes,startDate,endDate,createdYear:form.createdYear||String(new Date().getFullYear())};
  if(editId!==null){
    entries=entries.map(e=>e.id===editId?{...entry,id:editId}:e);
    detailId=editId;editId=null;view='detail';
  } else {
    entry.id=Date.now();entries.unshift(entry);view='list';
  }
  render();
  await saveEntries();
}

// ── Init ──────────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
// Initial load: render from localStorage first (instant), then sync from GitHub
render();
ghFetch();
</script>
</body>
</html>
